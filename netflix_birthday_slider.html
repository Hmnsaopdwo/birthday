
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .nf-wrap { position: relative; width: 100%; height: 520px; overflow: hidden; background: #000; font-family: 'Netflix Sans', Arial, sans-serif; }
  .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease; }
  .slide.active { opacity: 1; }
  .slide-bg { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .slide-overlay { position: absolute; top: 0; left: 0; width: 60%; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.85) 40%, transparent 100%); }
  .slide-overlay-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%); }
  .navbar { position: absolute; top: 0; left: 0; width: 100%; display: flex; align-items: center; gap: 32px; padding: 18px 48px; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); }
  .nf-logo { color: #e50914; font-size: 28px; font-weight: 900; letter-spacing: -1px; }
  .nav-links { display: flex; gap: 20px; }
  .nav-links a { color: rgba(255,255,255,0.85); font-size: 13px; text-decoration: none; cursor: pointer; }
  .nav-links a:hover { color: #fff; }
  .nav-right { margin-left: auto; color: #fff; font-size: 18px; cursor: pointer; }
  .content { position: absolute; bottom: 100px; left: 48px; z-index: 5; max-width: 500px; }
  .n-series { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .n-badge { background: #e50914; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 2px; }
  .n-text { color: #fff; font-size: 13px; letter-spacing: 3px; font-weight: 400; }
  .title { color: #fff; font-size: 52px; font-weight: 800; line-height: 1.05; margin-bottom: 12px; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
  .top-badge { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .top10 { background: #e50914; color: #fff; font-size: 10px; font-weight: 900; padding: 2px 5px; border-radius: 2px; }
  .top-text { color: #e50914; font-size: 13px; font-weight: 700; }
  .desc { color: rgba(255,255,255,0.9); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
  .buttons { display: flex; gap: 12px; }
  .btn-play { background: #fff; color: #000; border: none; padding: 10px 24px; font-size: 15px; font-weight: 700; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .btn-play:hover { background: rgba(255,255,255,0.8); }
  .btn-info { background: rgba(109,109,110,0.7); color: #fff; border: none; padding: 10px 24px; font-size: 15px; font-weight: 600; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .btn-info:hover { background: rgba(109,109,110,0.9); }
  .indicators { position: absolute; bottom: 60px; right: 48px; display: flex; gap: 8px; z-index: 10; align-items: center; }
  .dot { width: 10px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.3s; }
  .dot.active { width: 22px; background: #e50914; }
  .arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; background: rgba(0,0,0,0.5); border: 1.5px solid rgba(255,255,255,0.3); color: #fff; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .arrow:hover { background: rgba(0,0,0,0.8); }
  .arrow-left { left: 16px; }
  .arrow-right { right: 16px; }
  .progress-bar { position: absolute; top: 0; left: 0; height: 3px; background: #e50914; z-index: 20; transition: width 0.1s linear; }
</style>

<div class="nf-wrap" id="nfWrap">
  <div class="progress-bar" id="progressBar"></div>

  <!-- Slide 1 -->
  <div class="slide active" id="slide0">
    <img class="slide-bg" src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=1400&q=80" alt="slide1" />
    <div class="slide-overlay"></div>
    <div class="slide-overlay-bottom"></div>
  </div>

  <!-- Slide 2 -->
  <div class="slide" id="slide1">
    <img class="slide-bg" src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=1400&q=80" alt="slide2" />
    <div class="slide-overlay"></div>
    <div class="slide-overlay-bottom"></div>
  </div>

  <!-- Slide 3 -->
  <div class="slide" id="slide2">
    <img class="slide-bg" src="https://images.unsplash.com/photo-1488716820095-cbe80883c496?w=1400&q=80" alt="slide3" />
    <div class="slide-overlay"></div>
    <div class="slide-overlay-bottom"></div>
  </div>

  <!-- Slide 4 -->
  <div class="slide" id="slide3">
    <img class="slide-bg" src="https://images.unsplash.com/photo-1502716119720-b23a93e5fe1b?w=1400&q=80" alt="slide4" />
    <div class="slide-overlay"></div>
    <div class="slide-overlay-bottom"></div>
  </div>

  <!-- Navbar -->
  <div class="navbar">
    <div class="nf-logo">NETFLIX</div>
    <div class="nav-links">
      <a>Beranda</a>
      <a>Kenangan</a>
      <a>Fitur Spesial</a>
      <a>Pesan Digital</a>
    </div>
    <div class="nav-right">🔇</div>
  </div>

  <!-- Content overlay -->
  <div class="content">
    <div class="n-series">
      <span class="n-badge">N</span>
      <span class="n-text">S E R I E S</span>
    </div>
    <div class="title">ASTIN'S<br>20TH</div>
    <div class="top-badge">
      <span class="top10">TOP<br>10</span>
      <span class="top-text">#1 di Indonesia</span>
    </div>
    <div class="desc">Satu tahun bertambah, satu juta memori baru siap diciptakan.<br>Selamat ulang tahun, Astin!</div>
    <div class="buttons">
      <button class="btn-play">▶ Putar Pesan</button>
      <button class="btn-info">ℹ Info Selengkapnya</button>
    </div>
  </div>

  <!-- Arrows -->
  <div class="arrow arrow-left" id="arrowLeft">&#8249;</div>
  <div class="arrow arrow-right" id="arrowRight">&#8250;</div>

  <!-- Dots -->
  <div class="indicators" id="dots">
    <div class="dot active" data-i="0"></div>
    <div class="dot" data-i="1"></div>
    <div class="dot" data-i="2"></div>
    <div class="dot" data-i="3"></div>
  </div>
</div>

<script>
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  const bar = document.getElementById('progressBar');
  let current = 0;
  let progress = 0;
  let timer;
  const duration = 5000;

  function goTo(n) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    progress = 0;
    bar.style.width = '0%';
    clearInterval(timer);
    startTimer();
  }

  function startTimer() {
    const step = 50;
    timer = setInterval(() => {
      progress += (step / duration) * 100;
      bar.style.width = Math.min(progress, 100) + '%';
      if (progress >= 100) goTo(current + 1);
    }, step);
  }

  document.getElementById('arrowLeft').onclick = () => goTo(current - 1);
  document.getElementById('arrowRight').onclick = () => goTo(current + 1);
  dots.forEach(d => d.onclick = () => goTo(parseInt(d.dataset.i)));

  startTimer();
</script>
